
<div class="auth-page">

  <div class="auth-card">

    <h2 *ngIf="mode === 'login'">🔐 Login</h2>
    <h2 *ngIf="mode === 'register'">📝 Register</h2>

    <p *ngIf="mode === 'login'">Welcome back 👋</p>
    <p *ngIf="mode === 'register'">Create your account 🚀</p>

    <input
      type="text"
      placeholder="Username"
      [(ngModel)]="username"
    />

    <input
      type="password"
      placeholder="Password"
      [(ngModel)]="password"
    />

    <!-- REGISTER EXTRA FIELD -->
    <input
      *ngIf="mode === 'register'"
      type="password"
      placeholder="Confirm Password"
      [(ngModel)]="confirmPassword"
    />

    <button (click)="submit()">
      {{ mode === 'login' ? 'Login' : 'Register' }}
    </button>

    <p class="switch">
      <span *ngIf="mode === 'login'">
        No account?
        <a (click)="mode = 'register'">Register</a>
      </span>

      <span *ngIf="mode === 'register'">
        Already have account?
        <a (click)="mode = 'login'">Login</a>
      </span>
    </p>

  </div>

</div>
